  <rect x="1190" y="648" width="346" height="202" rx="12" fill="#020617" stroke="#1e293b"/>
  <text x="1210" y="676" class="mono purple small"># AI generated Python rule</text>
  <text x="1210" y="700" class="mono soft xs"># Unlock feed cards and append a preview item.</text>
  <text x="1210" y="724" class="mono text xs">def handle(stage, req, resp):</text>
  <text x="1230" y="748" class="mono text xs">if stage != "response": return resp</text>
  <text x="1230" y="772" class="mono text xs">data = json.loads(resp.body)</text>
  <text x="1230" y="796" class="mono yellow xs">for item in data["data"]["items"]:</text>
  <text x="1250" y="820" class="mono yellow xs">item["locked"] = False</text>
  <text x="1230" y="844" class="mono green xs">data["data"]["items"].append(test_card())</text>

